model:
  patch_size: 2
  in_channels: 4
  hidden_size: 384
  depth: 6
  num_heads: 6
  mlp_ratio: 4.0
  num_frames: 8
  frame_height: 32
  frame_width: 32
  audio_dim: 128

train:
  batch_size: 2
  lr: 1.0e-4
  weight_decay: 0.01
  epochs: 5
  grad_clip: 1.0
  log_every: 10
  checkpoint_dir: checkpoints
  use_fp4_qat: true
  fp4_block_size: 64
  ema_decay: 0.999

diffusion:
  timesteps: 1000
  beta_start: 0.0001
  beta_end: 0.02
