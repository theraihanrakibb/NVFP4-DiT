diffusion:
  beta_end: 0.02
  beta_start: 0.0001
  schedule: cosine
  timesteps: 1000
model:
  audio_dim: 128
  depth: 6
  frame_height: 32
  frame_width: 32
  hidden_size: 384
  in_channels: 4
  mlp_ratio: 4.0
  num_frames: 8
  num_heads: 6
  patch_size: 2
train:
  adaptive_block_size: false
  adaptive_lam: 1.0
  batch_size: 2
  checkpoint_dir: checkpoints
  ema_decay: 0.999
  epochs: 5
  fp4_block_size: 64
  grad_clip: 1.0
  log_every: 10
  loss:
    lambda_sync: 0.1
    lambda_temp: 0.01
    use_sync: false
    use_temp: true
  lr: 0.0001
  use_fp4_qat: true
  weight_decay: 0.01
